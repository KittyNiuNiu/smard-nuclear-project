version: 2

models:
  - name: stg_smard_timeseries
    description: "Cleaned, deduplicated SMARD timeseries with proper timestamps and Berlin local date."
    columns:
      - name: filter_id
        description: "SMARD filter code"
        data_tests:
          - not_null

      - name: region
        description: "Region code"
        data_tests:
          - not_null

      - name: date
        data_tests:
          - not_null

      - name: mwh
        description: "Generation/consumption in MWh per day, or price in EUR/MWh. Never NULL in this model."
        data_tests:
          - not_null